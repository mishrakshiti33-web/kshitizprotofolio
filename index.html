<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kshitiz Mishra — AI Agent & Website Developer | Nepal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portfolio of Kshitiz Mishra. AI Agent Developer & Website Developer. Creator of Zynora AI and modern web solutions." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="profile">
      <div class="profile-background"></div>
      <img src="https://i.postimg.cc/XNsXRTrK/IMG-20260327-141114.jpg" alt="Kshitiz Mishra" class="avatar" loading="lazy" />
      <h1 class="title-gradient">Kshitiz Mishra</h1>
      <h2>AI Agent Developer &nbsp; | &nbsp; Website Developer &nbsp; | &nbsp; Nepal</h2>
      <p class="tagline">
        Building intelligent automation and modern web experiences.
      </p>
    </header>

    <nav class="tabs">
      <button data-tab="about" class="active">About Me</button>
      <button data-tab="projects">Projects</button>
      <button data-tab="reviews">Reviews</button>
      <button data-tab="contact">Contact</button>
    </nav>

    <section id="tab-content"></section>

    <div id="reviewModal" class="modal hidden">
      <div class="modal-content">
        <button class="modal-close" id="closeReviewModal">&times;</button>
        <h2>Share Your Review</h2>
        <form id="reviewForm">
          <div class="form-group">
            <label for="reviewerName">Your Name *</label>
            <input type="text" id="reviewerName" placeholder="Enter your full name" required />
          </div>
          <div class="form-group">
            <label for="reviewerRole">Your Role/Company *</label>
            <input type="text" id="reviewerRole" placeholder="e.g., CEO, Startup Hub" required />
          </div>
          <div class="form-group">
            <label for="reviewRating">Rating *</label>
            <div class="star-rating" id="starRating">
              <span class="star" data-value="1">★</span>
              <span class="star" data-value="2">★</span>
              <span class="star" data-value="3">★</span>
              <span class="star" data-value="4">★</span>
              <span class="star" data-value="5">★</span>
            </div>
            <input type="hidden" id="reviewRatingValue" value="5" />
          </div>
          <div class="form-group">
            <label for="reviewText">Your Review *</label>
            <textarea id="reviewText" placeholder="Share your experience working with Kshitiz..." maxlength="500" rows="4" required></textarea>
            <span class="char-count"><span id="charCount">0</span>/500</span>
          </div>
          <button type="submit" class="submit-btn">Post Review</button>
        </form>
      </div>
    </div>

    <footer>
      © <span id="year"></span> Kshitiz Mishra. All rights reserved.
    </footer>
  </main>

  <script src="main.js"></script>
</body>
</html>
